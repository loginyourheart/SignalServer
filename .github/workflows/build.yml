name: Build Multi-Platform

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64 (glibc)
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: true
            artifact-name: linux-x86_64-glibc

          - name: Linux x86_64 (musl)
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use-cross: true
            artifact-name: linux-x86_64-musl

          - name: ARM v7 (glibc)
            os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            use-cross: true
            artifact-name: armv7-glibc

          - name: ARM v7 (musl)
            os: ubuntu-latest
            target: armv7-unknown-linux-musleabihf
            use-cross: true
            artifact-name: armv7-musl

          - name: ARM64 (glibc)
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true
            artifact-name: arm64-glibc

          - name: ARM64 (musl)
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use-cross: true
            artifact-name: arm64-musl

          - name: ARM v6 (glibc)
            os: ubuntu-latest
            target: arm-unknown-linux-gnueabihf
            use-cross: true
            artifact-name: armv6-glibc

          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            use-cross: false
            artifact-name: windows-x86_64

          - name: Windows x86
            os: windows-latest
            target: i686-pc-windows-msvc
            use-cross: false
            artifact-name: windows-x86

          - name: macOS x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            use-cross: false
            artifact-name: macos-x86_64

          - name: macOS ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            use-cross: false
            artifact-name: macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross (Linux)
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build with Cross
        if: matrix.use-cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with Cargo
        if: "!matrix.use-cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: target/${{ matrix.target }}/release/peerjs-server-rs

      - name: Upload Binary (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: target/${{ matrix.target }}/release/peerjs-server-rs.exe
