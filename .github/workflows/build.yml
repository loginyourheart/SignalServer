name: Build for Raspberry Pi 64bit Musl

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl # 使用 musl 目标

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build
        run: |
          # 使用 cross 进行静态编译
          cross build --release --target aarch64-unknown-linux-musl

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: raspberry-pi-64bit-musl-binary
          path: target/aarch64-unknown-linux-musl/release/
