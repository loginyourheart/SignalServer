<script>
    // 连接到 Rust PeerJS 服务器
    const ws = new WebSocket('ws://127.0.0.1:3000/peerjs?id=user1&token=mytoken&key=peerjs');

    ws.onopen = () => {
        console.log('Connected!');

        // 发送消息给另一个用户
        ws.send(JSON.stringify({
            type: 'OFFER',
            dst: 'user2',
            payload: { sdp: '...' }
        }));
    };

    ws.onmessage = (event) => {
        const message = JSON.parse(event.data);
        console.log('Received:', message);
    };
</script>
