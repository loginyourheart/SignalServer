<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket连接调试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #4a5568;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: 700;
        }

        .section {
            margin-bottom: 25px;
            padding: 20px;
            border-radius: 12px;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            border-left: 4px solid #4299e1;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #4a5568;
        }

        input, button {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        button {
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(66, 153, 225, 0.3);
        }

        button:disabled {
            background: #a0aec0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .log {
            background: #1a202c;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 12px;
            font-family: 'Monaco', 'Menlo', monospace;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
            border: 2px solid #4a5568;
        }

        .status {
            padding: 12px 20px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: 600;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status.connected {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
        }

        .status.disconnected {
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
            color: white;
        }

        .status.connecting {
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
            color: white;
        }

        .error {
            color: #e53e3e;
            font-weight: 600;
            background: #fed7d7;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
        }

        .success {
            color: #38a169;
            font-weight: 600;
            background: #c6f6d5;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
        }

        .message-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .message-input input {
            flex: 1;
        }

        .message-input button {
            width: auto;
            padding: 12px 24px;
            margin-top: 0;
        }

        .timestamp {
            color: #718096;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔌 WebSocket连接调试工具</h1>

    <div class="section">
        <h3>连接配置</h3>
        <div class="input-group">
            <label for="wsUrl">WebSocket URL:</label>
            <input type="text" id="wsUrl" value="ws://127.0.0.1:3000/peerjs?id=user2&token=m22ytoken&key=peerjs">
        </div>
        <button id="connectBtn" onclick="connectWebSocket()">连接</button>
        <button id="disconnectBtn" onclick="disconnectWebSocket()" disabled>断开连接</button>
    </div>

    <div class="section">
        <h3>连接状态</h3>
        <div id="status" class="status disconnected">未连接</div>
    </div>

    <div class="section">
        <h3>发送消息</h3>
        <div class="message-input">
            <input type="text" id="messageInput" placeholder="输入要发送的消息..." disabled>
            <button onclick="sendMessage()" id="sendBtn" disabled>发送</button>
        </div>
    </div>

    <div class="section">
        <h3>连接日志</h3>
        <div id="log" class="log">等待连接...</div>
    </div>

    <div class="section">
        <h3>常见问题排查</h3>
        <div style="background: #fff; padding: 15px; border-radius: 8px; margin-top: 10px;">
            <h4>可能的连接关闭原因：</h4>
            <ul>
                <li><strong>服务器未运行：</strong> 确保 Rust PeerJS 服务器正在 127.0.0.1:3000 运行</li>
                <li><strong>认证失败：</strong> 检查 token 和 key 参数是否正确</li>
                <li><strong>协议不匹配：</strong> 确保服务器支持 WebSocket 协议</li>
                <li><strong>网络问题：</strong> 检查防火墙设置</li>
                <li><strong>用户ID冲突：</strong> user2 可能已经被其他连接使用</li>
                <li><strong>超时断开：</strong> 服务器可能有连接超时设置</li>
            </ul>
        </div>
    </div>
</div>

<script>
    let ws = null;
    let reconnectInterval = null;

    function log(message, type = 'info') {
        const logDiv = document.getElementById('log');
        const timestamp = new Date().toLocaleTimeString();
        const color = type === 'error' ? '#f56565' :
            type === 'success' ? '#48bb78' :
                type === 'warning' ? '#ed8936' : '#e2e8f0';

        logDiv.innerHTML += `<div style="color: ${color}; margin: 5px 0;">
                <span class="timestamp">[${timestamp}]</span> ${message}
            </div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function updateStatus(status, message) {
        const statusDiv = document.getElementById('status');
        statusDiv.className = `status ${status}`;
        statusDiv.textContent = message;

        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        if (status === 'connected') {
            connectBtn.disabled = true;
            disconnectBtn.disabled = false;
            messageInput.disabled = false;
            sendBtn.disabled = false;
        } else {
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            messageInput.disabled = true;
            sendBtn.disabled = true;
        }
    }

    function connectWebSocket() {
        const url = document.getElementById('wsUrl').value;

        if (ws && ws.readyState === WebSocket.OPEN) {
            log('WebSocket已经连接', 'warning');
            return;
        }

        log(`尝试连接到: ${url}`, 'info');
        updateStatus('connecting', '连接中...');

        try {
            ws = new WebSocket(url);

            ws.onopen = function(event) {
                log('WebSocket连接成功！', 'success');
                updateStatus('connected', '已连接');
                clearInterval(reconnectInterval);
            };

            ws.onmessage = function(event) {
                log(`收到消息: ${event.data}`, 'success');
                try {
                    const message = JSON.parse(event.data);
                    log(`解析后的消息: ${JSON.stringify(message, null, 2)}`, 'info');
                } catch (e) {
                    log(`消息不是有效的JSON: ${event.data}`, 'warning');
                }
            };

            ws.onclose = function(event) {
                log(`WebSocket连接关闭 - 代码: ${event.code}, 原因: ${event.reason || '无原因'}`, 'error');
                updateStatus('disconnected', '连接已断开');

                // 关闭代码说明
                const closeReasons = {
                    1000: '正常关闭',
                    1001: '端点正在离开',
                    1002: '协议错误',
                    1003: '不支持的数据类型',
                    1005: '没有状态码',
                    1006: '异常关闭',
                    1007: '无效的帧数据',
                    1008: '策略违规',
                    1009: '消息太大',
                    1010: '扩展协商失败',
                    1011: '服务器错误',
                    1015: 'TLS握手失败'
                };

                const reason = closeReasons[event.code] || '未知原因';
                log(`关闭原因详情: ${reason}`, 'error');
            };

            ws.onerror = function(error) {
                log(`WebSocket错误: ${error.message || '连接失败'}`, 'error');
                updateStatus('disconnected', '连接错误');
            };

            // 连接超时检测
            setTimeout(() => {
                if (ws.readyState === WebSocket.CONNECTING) {
                    log('连接超时，正在关闭连接...', 'error');
                    ws.close();
                    updateStatus('disconnected', '连接超时');
                }
            }, 5000);

        } catch (error) {
            log(`创建WebSocket时出错: ${error.message}`, 'error');
            updateStatus('disconnected', '创建连接失败');
        }
    }

    function disconnectWebSocket() {
        if (ws) {
            ws.close(1000, '用户主动断开');
            log('用户主动断开连接', 'info');
        }
    }

    function sendMessage() {
        const messageInput = document.getElementById('messageInput');
        const message = messageInput.value.trim();

        if (!message) {
            log('请输入要发送的消息', 'warning');
            return;
        }

        if (ws && ws.readyState === WebSocket.OPEN) {
            try {
                // 尝试作为JSON发送
                let messageToSend;
                try {
                    messageToSend = JSON.parse(message);
                } catch (e) {
                    // 如果不是有效JSON，创建一个简单的消息对象
                    messageToSend = {
                        type: 'MESSAGE',
                        dst: 'user1', // 假设发给user1
                        payload: message
                    };
                }

                ws.send(JSON.stringify(messageToSend));
                log(`发送消息: ${JSON.stringify(messageToSend)}`, 'info');
                messageInput.value = '';
            } catch (error) {
                log(`发送消息失败: ${error.message}`, 'error');
            }
        } else {
            log('WebSocket未连接，无法发送消息', 'error');
        }
    }

    // 回车发送消息
    document.getElementById('messageInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });

    // 页面加载时的初始化
    log('WebSocket调试工具已加载', 'success');
    log('点击"连接"按钮开始测试连接', 'info');
</script>
</body>
</html>
